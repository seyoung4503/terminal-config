set -g mode-keys vi
set -g mouse on
set -g allow-passthrough on
set -g set-clipboard on

# 마우스 드래그 선택 → 자동으로 macOS 클립보드 복사
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# vim-tmux-navigator: Ctrl+hjkl로 vim/tmux 패인 통합 이동
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Shift+Enter 패스스루 (Claude Code 줄바꿈)
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

# Shift+Enter를 CSI u 시퀀스로 직접 전달
bind -n S-Enter send-keys Escape '[13;2u'
